<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyVF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#FED7AA"/>
    </linearGradient>
    <linearGradient id="waterVF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="mistVF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="350" fill="url(#skyVF)"/>
  <!-- Sun -->
  <circle cx="600" cy="160" r="55" fill="#FFFFFF" fill-opacity="0.6"/>
  <circle cx="600" cy="160" r="40" fill="#FEF3C7"/>
  <!-- Distant mountains -->
  <path d="M0,280 L120,220 L220,260 L340,210 L460,250 L580,200 L700,240 L800,210 L800,350 L0,350 Z" fill="#0F766E" fill-opacity="0.6"/>
  <path d="M0,310 L100,260 L200,290 L320,250 L440,285 L560,245 L680,280 L800,255 L800,350 L0,350 Z" fill="#134E4A" fill-opacity="0.8"/>
  <!-- Cliff edge -->
  <rect x="0" y="350" width="800" height="50" fill="#78350F"/>
  <rect x="0" y="370" width="800" height="30" fill="#451A03"/>
  <!-- Waterfall -->
  <rect x="50" y="350" width="700" height="200" fill="url(#waterVF)"/>
  <!-- Water streaks -->
  <g stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none">
    <line x1="100" y1="370" x2="100" y2="540"/>
    <line x1="180" y1="370" x2="180" y2="540"/>
    <line x1="260" y1="370" x2="260" y2="540"/>
    <line x1="340" y1="370" x2="340" y2="540"/>
    <line x1="420" y1="370" x2="420" y2="540"/>
    <line x1="500" y1="370" x2="500" y2="540"/>
    <line x1="580" y1="370" x2="580" y2="540"/>
    <line x1="660" y1="370" x2="660" y2="540"/>
    <line x1="740" y1="370" x2="740" y2="540"/>
  </g>
  <!-- Mist at bottom -->
  <ellipse cx="400" cy="540" rx="450" ry="80" fill="url(#mistVF)"/>
  <ellipse cx="200" cy="555" rx="250" ry="50" fill="rgba(255,255,255,0.7)"/>
  <ellipse cx="600" cy="555" rx="250" ry="50" fill="rgba(255,255,255,0.7)"/>
  <!-- Birds -->
  <g fill="none" stroke="#1E293B" stroke-width="2" stroke-linecap="round">
    <path d="M 480 130 q 8 -8 16 0 q 8 -8 16 0"/>
    <path d="M 540 110 q 6 -6 12 0 q 6 -6 12 0"/>
    <path d="M 510 90 q 7 -7 14 0 q 7 -7 14 0"/>
  </g>
  <rect width="800" height="600" fill="rgba(0,0,0,0)" stroke="none"/>
</svg>