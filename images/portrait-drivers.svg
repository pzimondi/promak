<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="dBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f4f4d"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
    <linearGradient id="dSkin1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#92400e"/><stop offset="100%" stop-color="#451a03"/></linearGradient>
    <linearGradient id="dSkin2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a16207"/><stop offset="100%" stop-color="#78350f"/></linearGradient>
    <linearGradient id="dSkin3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c2d12"/><stop offset="100%" stop-color="#3f1605"/></linearGradient>
  </defs>

  <!-- Teal gradient background -->
  <rect width="400" height="400" fill="url(#dBg)"/>

  <!-- Subtle road / horizon hint -->
  <path d="M 0 340 L 400 340" stroke="#fcd34d" stroke-width="1" opacity="0.3"/>
  <g stroke="#fcd34d" stroke-width="2" stroke-dasharray="14 8" opacity="0.45">
    <path d="M 0 365 L 400 365"/>
  </g>

  <!-- Soft glow -->
  <circle cx="200" cy="160" r="180" fill="#0f4f4d" opacity="0.5"/>

  <!-- Subtle decorative sparkles -->
  <g fill="#fcd34d" opacity="0.7">
    <path d="M 60 60 L 64 70 L 60 80 L 56 70 Z"/>
    <path d="M 340 80 L 343 87 L 340 94 L 337 87 Z"/>
    <path d="M 320 290 L 323 297 L 320 304 L 317 297 Z"/>
  </g>

  <!-- Dot pattern -->
  <g fill="#fcd34d" opacity="0.2">
    <circle cx="50" cy="280" r="2"/>
    <circle cx="65" cy="280" r="2"/>
    <circle cx="80" cy="280" r="2"/>
    <circle cx="50" cy="295" r="2"/>
    <circle cx="65" cy="295" r="2"/>
  </g>

  <!-- LEFT FIGURE (back) -->
  <g transform="translate(85, 0)">
    <!-- shirt -->
    <path d="M 30 400 L 38 280 Q 100 260 160 280 L 168 400 Z" fill="#1c4d4b"/>
    <path d="M 95 270 L 99 290 L 103 270" stroke="#fef9e7" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- neck -->
    <path d="M 85 230 Q 99 240 113 230 L 113 260 Q 99 265 85 260 Z" fill="url(#dSkin1)"/>
    <!-- head -->
    <ellipse cx="99" cy="200" rx="42" ry="48" fill="url(#dSkin1)"/>
    <!-- hair -->
    <path d="M 60 170 Q 65 140 99 132 Q 133 140 138 170 Q 138 180 135 185 Q 115 175 99 175 Q 83 175 63 185 Q 60 180 60 170 Z" fill="#1c1917"/>
    <!-- eyes -->
    <ellipse cx="86" cy="205" rx="3.5" ry="2.8" fill="#1c1917"/>
    <ellipse cx="112" cy="205" rx="3.5" ry="2.8" fill="#1c1917"/>
    <!-- brows -->
    <path d="M 79 193 Q 86 191 93 193" stroke="#1c1917" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M 105 193 Q 112 191 119 193" stroke="#1c1917" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- smile -->
    <path d="M 87 224 Q 99 232 111 224" stroke="#1c1917" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- RIGHT FIGURE (back) -->
  <g transform="translate(215, 0)">
    <path d="M 30 400 L 38 280 Q 100 260 160 280 L 168 400 Z" fill="#1c4d4b"/>
    <path d="M 95 270 L 99 290 L 103 270" stroke="#fef9e7" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 85 230 Q 99 240 113 230 L 113 260 Q 99 265 85 260 Z" fill="url(#dSkin3)"/>
    <ellipse cx="99" cy="200" rx="42" ry="48" fill="url(#dSkin3)"/>
    <!-- short fade -->
    <path d="M 60 170 Q 65 138 99 130 Q 133 138 138 170 Q 138 180 135 185 Q 115 175 99 175 Q 83 175 63 185 Q 60 180 60 170 Z" fill="#1c1917"/>
    <ellipse cx="86" cy="205" rx="3.5" ry="2.8" fill="#1c1917"/>
    <ellipse cx="112" cy="205" rx="3.5" ry="2.8" fill="#1c1917"/>
    <path d="M 79 193 Q 86 191 93 193" stroke="#1c1917" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M 105 193 Q 112 191 119 193" stroke="#1c1917" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M 87 226 Q 99 230 111 226" stroke="#1c1917" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- CENTER FIGURE (front, larger) -->
  <g transform="translate(150, 30)">
    <!-- shirt with darker tone -->
    <path d="M 25 370 L 35 240 Q 100 215 165 240 L 175 370 Z" fill="#042f2e" stroke="#0f4f4d" stroke-width="1"/>
    <!-- collar -->
    <path d="M 88 230 L 95 255 Q 100 258 105 255 L 112 230" stroke="#fef9e7" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- small tag/badge -->
    <rect x="120" y="265" width="22" height="14" rx="2" fill="#fcd34d"/>
    <text x="131" y="276" font-family="sans-serif" font-size="8" font-weight="700" text-anchor="middle" fill="#042f2e">PRO</text>
    <!-- neck -->
    <path d="M 82 180 Q 100 192 118 180 L 118 220 Q 100 225 82 220 Z" fill="url(#dSkin2)"/>
    <!-- head -->
    <ellipse cx="100" cy="140" rx="56" ry="64" fill="url(#dSkin2)"/>
    <!-- hair -->
    <path d="M 47 105 Q 53 65 100 55 Q 147 65 153 105 Q 153 122 148 130 Q 122 116 100 116 Q 78 116 52 130 Q 47 122 47 105 Z" fill="#1c1917"/>
    <!-- ears -->
    <ellipse cx="46" cy="152" rx="6" ry="10" fill="url(#dSkin2)"/>
    <ellipse cx="154" cy="152" rx="6" ry="10" fill="url(#dSkin2)"/>
    <!-- brows -->
    <path d="M 71 132 Q 84 128 95 132" stroke="#1c1917" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 105 132 Q 116 128 129 132" stroke="#1c1917" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- eyes -->
    <ellipse cx="83" cy="148" rx="5" ry="3.6" fill="#1c1917"/>
    <ellipse cx="117" cy="148" rx="5" ry="3.6" fill="#1c1917"/>
    <circle cx="84.5" cy="146.5" r="1.3" fill="#fef9e7"/>
    <circle cx="118.5" cy="146.5" r="1.3" fill="#fef9e7"/>
    <!-- nose -->
    <path d="M 100 160 Q 96 178 100 184 Q 104 184 105 181" stroke="#5d2f0a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- cheek -->
    <ellipse cx="72" cy="172" rx="9" ry="5" fill="#7c2d12" opacity="0.3"/>
    <ellipse cx="128" cy="172" rx="9" ry="5" fill="#7c2d12" opacity="0.3"/>
    <!-- smile -->
    <path d="M 80 192 Q 100 204 120 192" stroke="#1c1917" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <path d="M 86 194 Q 100 199 114 194" stroke="#fef9e7" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
