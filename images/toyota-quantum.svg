<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none">
  <!-- Ground shadow -->
  <ellipse cx="400" cy="430" rx="350" ry="14" fill="#000" opacity="0.12"/>
  <path d="M 70 390 L 730 390 L 720 415 L 80 415 Z" fill="#000" opacity="0.08"/>

  <defs>
    <linearGradient id="bodyQuantum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e6ea"/>
      <stop offset="55%" stop-color="#c8ced4"/>
      <stop offset="100%" stop-color="#9ea6af"/>
    </linearGradient>
    <linearGradient id="windowQuantum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3a4a"/>
      <stop offset="100%" stop-color="#4a5868"/>
    </linearGradient>
  </defs>

  <!-- Lower body -->
  <path d="M 80 355
           L 110 355
           L 125 380
           L 200 380
           L 215 355
           L 545 355
           L 560 380
           L 635 380
           L 650 355
           L 715 355
           L 710 390
           L 85 390 Z"
        fill="#a8b0b8"/>

  <!-- Main body - tall boxy minibus shape -->
  <path d="M 85 355
           L 85 170
           Q 85 130, 150 122
           L 220 118
           L 540 118
           Q 595 120, 635 145
           L 685 180
           Q 710 215, 715 250
           L 715 355 Z"
        fill="url(#bodyQuantum)"/>

  <!-- Windscreen - tall and upright -->
  <path d="M 150 125
           Q 180 122, 220 120
           L 220 200
           L 145 200
           Q 135 165, 150 125 Z"
        fill="url(#windowQuantum)"/>

  <!-- Driver/front side window -->
  <path d="M 225 120
           L 320 120
           L 320 210
           L 225 210 Z"
        fill="url(#windowQuantum)"/>

  <!-- 1st passenger row window -->
  <path d="M 325 120
           L 420 120
           L 420 210
           L 325 210 Z"
        fill="url(#windowQuantum)"/>

  <!-- 2nd passenger row window -->
  <path d="M 425 120
           L 520 120
           L 520 210
           L 425 210 Z"
        fill="url(#windowQuantum)"/>

  <!-- 3rd passenger row window -->
  <path d="M 525 120
           L 605 120
           L 605 210
           L 525 210 Z"
        fill="url(#windowQuantum)"/>

  <!-- Rear quarter window -->
  <path d="M 610 120
           Q 650 125, 670 145
           L 695 180
           L 695 210
           L 610 210 Z"
        fill="url(#windowQuantum)"/>

  <!-- Chrome trim line along window base -->
  <line x1="150" y1="215" x2="695" y2="215" stroke="#7a838c" stroke-width="2"/>

  <!-- Door handle -->
  <rect x="265" y="265" width="35" height="4" rx="2" fill="#5a6068"/>

  <!-- Sliding door handle (longer) -->
  <rect x="395" y="265" width="60" height="5" rx="2.5" fill="#5a6068"/>

  <!-- Door seams -->
  <line x1="220" y1="130" x2="220" y2="380" stroke="#88909a" stroke-width="1.2"/>
  <line x1="325" y1="215" x2="325" y2="380" stroke="#88909a" stroke-width="1.2"/>
  <line x1="520" y1="215" x2="520" y2="380" stroke="#88909a" stroke-width="1.2"/>

  <!-- Window mullions -->
  <line x1="420" y1="125" x2="420" y2="205" stroke="#a0a8b0" stroke-width="1"/>
  <line x1="525" y1="125" x2="525" y2="205" stroke="#a0a8b0" stroke-width="1"/>

  <!-- Hood line -->
  <line x1="90" y1="245" x2="145" y2="200" stroke="#7a838c" stroke-width="1"/>

  <!-- Headlight - rectangular -->
  <path d="M 88 240
           L 145 240
           Q 153 240, 153 248
           L 153 278
           Q 153 285, 145 285
           L 92 285
           Q 88 285, 88 280 Z"
        fill="#f6f8fa" stroke="#88909a" stroke-width="1"/>
  <ellipse cx="120" cy="262" rx="22" ry="10" fill="#d8e4ef"/>
  <rect x="92" y="270" width="50" height="6" fill="#a0a8b0" opacity="0.5"/>

  <!-- Grille -->
  <rect x="92" y="298" width="58" height="20" rx="2" fill="#1f2935"/>
  <line x1="92" y1="305" x2="150" y2="305" stroke="#5a6068" stroke-width="1"/>
  <line x1="92" y1="311" x2="150" y2="311" stroke="#5a6068" stroke-width="1"/>

  <!-- Toyota emblem area -->
  <ellipse cx="121" cy="308" rx="10" ry="6" fill="#dde2e6" opacity="0.6"/>

  <!-- Side body crease/character line -->
  <line x1="95" y1="295" x2="710" y2="295" stroke="#a8b0b8" stroke-width="1.2"/>

  <!-- Side moulding -->
  <rect x="95" y="320" width="615" height="3" fill="#7a838c" opacity="0.5"/>

  <!-- Rear lights -->
  <rect x="697" y="245" width="18" height="65" rx="2" fill="#c0392b" opacity="0.85"/>
  <rect x="697" y="258" width="18" height="4" fill="#f39c12" opacity="0.7"/>

  <!-- Wheel arches -->
  <path d="M 125 380
           Q 125 330, 178 330
           Q 230 330, 230 380 Z"
        fill="#1a1f25"/>
  <path d="M 520 380
           Q 520 330, 578 330
           Q 635 330, 635 380 Z"
        fill="#1a1f25"/>

  <!-- Front wheel -->
  <circle cx="178" cy="380" r="48" fill="#1a1f25"/>
  <circle cx="178" cy="380" r="40" fill="#2c333d"/>
  <circle cx="178" cy="380" r="22" fill="#1a1f25"/>
  <g stroke="#5a6878" stroke-width="3" stroke-linecap="round">
    <line x1="178" y1="358" x2="178" y2="402"/>
    <line x1="156" y1="380" x2="200" y2="380"/>
    <line x1="163" y1="366" x2="193" y2="394"/>
    <line x1="163" y1="394" x2="193" y2="366"/>
  </g>
  <circle cx="178" cy="380" r="6" fill="#6a7888"/>

  <!-- Rear wheel -->
  <circle cx="578" cy="380" r="48" fill="#1a1f25"/>
  <circle cx="578" cy="380" r="40" fill="#2c333d"/>
  <circle cx="578" cy="380" r="22" fill="#1a1f25"/>
  <g stroke="#5a6878" stroke-width="3" stroke-linecap="round">
    <line x1="578" y1="358" x2="578" y2="402"/>
    <line x1="556" y1="380" x2="600" y2="380"/>
    <line x1="563" y1="366" x2="593" y2="394"/>
    <line x1="563" y1="394" x2="593" y2="366"/>
  </g>
  <circle cx="578" cy="380" r="6" fill="#6a7888"/>

  <!-- Body reflection highlight -->
  <path d="M 200 240 L 540 235 L 540 255 L 200 260 Z" fill="#ffffff" opacity="0.3"/>

  <!-- Subtle "QUANTUM" badge hint near rear -->
  <rect x="620" y="335" width="50" height="3" rx="1.5" fill="#6a7888" opacity="0.6"/>
</svg>
