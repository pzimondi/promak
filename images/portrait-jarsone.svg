<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="jBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="50%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="jSkin" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#a16207"/>
      <stop offset="50%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="jShirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f4f4d"/>
      <stop offset="100%" stop-color="#042f2e"/>
    </linearGradient>
  </defs>

  <!-- Warm gradient background -->
  <rect width="400" height="400" fill="url(#jBg)"/>

  <!-- Soft sun glow -->
  <circle cx="320" cy="100" r="80" fill="#fef9e7" opacity="0.55"/>
  <circle cx="320" cy="100" r="40" fill="#fffbeb" opacity="0.7"/>

  <!-- Decorative dots pattern -->
  <g fill="#92400e" opacity="0.25">
    <circle cx="60" cy="90" r="2.5"/>
    <circle cx="80" cy="90" r="2.5"/>
    <circle cx="100" cy="90" r="2.5"/>
    <circle cx="60" cy="110" r="2.5"/>
    <circle cx="80" cy="110" r="2.5"/>
    <circle cx="60" cy="130" r="2.5"/>
  </g>

  <!-- Subtle horizon -->
  <path d="M 0 290 Q 200 280 400 295" stroke="#92400e" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Sparkle accents -->
  <g fill="#0f4f4d" opacity="0.6">
    <path d="M 350 220 L 354 230 L 350 240 L 346 230 Z"/>
    <path d="M 50 250 L 53 257 L 50 264 L 47 257 Z"/>
  </g>

  <!-- Shoulders / shirt (tour guide polo) -->
  <path d="M 80 400 L 100 320 Q 200 290 300 320 L 320 400 Z" fill="url(#jShirt)"/>

  <!-- Collar / V-neck detail -->
  <path d="M 180 305 L 200 335 L 220 305" stroke="#fef9e7" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- PROMAK logo accent on shirt (small star) -->
  <path d="M 245 345 l 2 5 l 5 1 l -4 4 l 1 5 l -4 -3 l -4 3 l 1 -5 l -4 -4 l 5 -1 z" fill="#fcd34d"/>

  <!-- Neck -->
  <path d="M 180 250 Q 200 265 220 250 L 220 290 Q 200 295 180 290 Z" fill="url(#jSkin)"/>
  <path d="M 180 280 Q 200 285 220 280" stroke="#451a03" stroke-width="1" opacity="0.4" fill="none"/>

  <!-- Head shape (slightly elongated oval) -->
  <ellipse cx="200" cy="185" rx="78" ry="92" fill="url(#jSkin)"/>

  <!-- Hair (close-cropped, with hairline) -->
  <path d="M 125 145 Q 130 105 200 95 Q 270 105 275 145 Q 275 165 270 175 Q 230 158 200 158 Q 170 158 130 175 Q 125 165 125 145 Z" fill="#1c1917"/>

  <!-- Hair texture lines -->
  <g stroke="#292524" stroke-width="1" fill="none" opacity="0.6">
    <path d="M 145 130 Q 165 115 185 122"/>
    <path d="M 215 122 Q 235 115 255 130"/>
    <path d="M 200 110 Q 215 105 230 110"/>
  </g>

  <!-- Ears -->
  <ellipse cx="125" cy="195" rx="9" ry="14" fill="url(#jSkin)"/>
  <ellipse cx="275" cy="195" rx="9" ry="14" fill="url(#jSkin)"/>

  <!-- Eyebrows -->
  <path d="M 158 178 Q 175 173 188 178" stroke="#1c1917" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 212 178 Q 225 173 242 178" stroke="#1c1917" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Eyes (warm, kind) -->
  <ellipse cx="173" cy="195" rx="7" ry="5" fill="#1c1917"/>
  <ellipse cx="227" cy="195" rx="7" ry="5" fill="#1c1917"/>
  <!-- Eye highlights -->
  <circle cx="175" cy="193" r="1.8" fill="#fef9e7"/>
  <circle cx="229" cy="193" r="1.8" fill="#fef9e7"/>

  <!-- Nose (subtle) -->
  <path d="M 200 210 Q 196 230 200 240 Q 205 240 207 235" stroke="#5d2f0a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Cheek warmth -->
  <ellipse cx="160" cy="225" rx="14" ry="8" fill="#92400e" opacity="0.3"/>
  <ellipse cx="240" cy="225" rx="14" ry="8" fill="#92400e" opacity="0.3"/>

  <!-- Warm smile -->
  <path d="M 175 248 Q 200 263 225 248" stroke="#1c1917" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Teeth hint -->
  <path d="M 183 250 Q 200 256 217 250" stroke="#fef9e7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
</svg>
