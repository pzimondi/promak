<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 280" preserveAspectRatio="xMidYMax meet" aria-hidden="true">
  <!-- Cape Town skyline silhouette: Lion's Head, Signal Hill, Table Mountain, Devil's Peak
       Viewed from the Atlantic seaboard / Bloubergstrand perspective -->

  <!-- Ocean horizon line (subtle) -->
  <line x1="0" y1="255" x2="1400" y2="255" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>

  <!-- Wave undulations along the foreground (Cape coastline) -->
  <path d="M 0 270
           Q 80 265, 160 270
           T 320 270
           T 480 270
           T 640 270
           T 800 270
           T 960 270
           T 1120 270
           T 1280 270
           T 1400 270
           L 1400 280 L 0 280 Z"
        fill="currentColor" opacity="0.55"/>

  <!-- Main mountain mass: from Signal Hill (left), Lion's Head, then the long flat Table Mountain top, then Devil's Peak -->
  <path d="M 0 240
           L 0 200
           Q 30 195, 60 190
           L 120 185
           Q 160 180, 200 165
           L 240 150
           Q 270 140, 290 130
           L 310 115
           Q 330 95, 350 75
           Q 370 60, 385 55
           Q 400 50, 420 65
           Q 440 80, 455 95
           L 470 105
           Q 480 115, 490 110
           L 510 95
           Q 530 75, 555 65
           L 570 65
           Q 585 65, 595 70
           L 600 75
           L 620 60
           Q 650 45, 680 35
           Q 720 30, 760 32
           Q 820 35, 880 38
           Q 920 40, 950 42
           L 980 44
           Q 1010 48, 1030 60
           Q 1050 75, 1070 95
           Q 1090 115, 1100 130
           L 1115 145
           Q 1135 165, 1160 175
           L 1200 185
           Q 1240 190, 1280 195
           L 1340 200
           Q 1370 205, 1400 210
           L 1400 240
           Z"
        fill="currentColor" opacity="0.85"/>

  <!-- Closer foreground hills (Bloubergstrand boulders / Signal Hill side) -->
  <path d="M 0 260
           L 0 235
           Q 50 230, 100 232
           Q 160 235, 210 245
           Q 250 252, 280 250
           Q 320 248, 360 252
           Q 410 255, 440 250
           Q 480 245, 520 252
           Q 570 258, 610 254
           Q 660 250, 700 254
           Q 760 258, 820 252
           Q 870 248, 920 254
           Q 970 258, 1020 252
           Q 1080 248, 1140 254
           Q 1200 258, 1260 252
           Q 1320 248, 1400 254
           L 1400 260 Z"
        fill="currentColor" opacity="0.7"/>

  <!-- Decorative protea flower silhouettes scattered in foreground (Cape fynbos) -->
  <g opacity="0.65">
    <!-- Protea 1: left -->
    <g transform="translate(140, 248)">
      <ellipse cx="0" cy="0" rx="6" ry="3" fill="currentColor"/>
      <path d="M -5 -2 L -4 -8 M -2 -3 L -1 -10 M 0 -3 L 0 -11 M 2 -3 L 3 -10 M 5 -2 L 6 -8"
            stroke="currentColor" stroke-width="0.8" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="0.8"/>
    </g>

    <!-- Protea 2: center-left -->
    <g transform="translate(450, 250)">
      <ellipse cx="0" cy="0" rx="7" ry="3.5" fill="currentColor"/>
      <path d="M -6 -2 L -5 -9 M -3 -3 L -2 -11 M 0 -3 L 0 -12 M 3 -3 L 4 -11 M 6 -2 L 7 -9"
            stroke="currentColor" stroke-width="0.9" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="currentColor" stroke-width="0.9"/>
    </g>

    <!-- Protea 3: center -->
    <g transform="translate(720, 248)">
      <ellipse cx="0" cy="0" rx="8" ry="4" fill="currentColor"/>
      <path d="M -7 -2 L -6 -10 M -4 -3 L -3 -12 M -1 -3 L -1 -13 M 2 -3 L 3 -13 M 5 -3 L 6 -12 M 7 -2 L 8 -10"
            stroke="currentColor" stroke-width="1" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="14" stroke="currentColor" stroke-width="1"/>
    </g>

    <!-- Protea 4: center-right -->
    <g transform="translate(990, 250)">
      <ellipse cx="0" cy="0" rx="7" ry="3.5" fill="currentColor"/>
      <path d="M -6 -2 L -5 -9 M -3 -3 L -2 -11 M 0 -3 L 0 -12 M 3 -3 L 4 -11 M 6 -2 L 7 -9"
            stroke="currentColor" stroke-width="0.9" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="12" stroke="currentColor" stroke-width="0.9"/>
    </g>

    <!-- Protea 5: right -->
    <g transform="translate(1260, 248)">
      <ellipse cx="0" cy="0" rx="6" ry="3" fill="currentColor"/>
      <path d="M -5 -2 L -4 -8 M -2 -3 L -1 -10 M 0 -3 L 0 -11 M 2 -3 L 3 -10 M 5 -2 L 6 -8"
            stroke="currentColor" stroke-width="0.8" stroke-linecap="round" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="0.8"/>
    </g>

    <!-- Small fynbos tufts scattered -->
    <g stroke="currentColor" stroke-width="0.7" fill="none" stroke-linecap="round">
      <path d="M 250 260 L 250 254 M 248 258 L 252 254 M 252 258 L 248 254"/>
      <path d="M 580 261 L 580 255 M 578 259 L 582 255 M 582 259 L 578 255"/>
      <path d="M 860 261 L 860 255 M 858 259 L 862 255 M 862 259 L 858 255"/>
      <path d="M 1130 261 L 1130 255 M 1128 259 L 1132 255 M 1132 259 L 1128 255"/>
    </g>
  </g>
</svg>
